[tool.uv.workspace]
members = ["server", "adapters/ezyvet", "sdk/python"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["server/tests"]
pythonpath = ["server"]
addopts = "--cov=vhir_server --cov-report=term-missing --cov-fail-under=80 --cov-config=server/pyproject.toml"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
