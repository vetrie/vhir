services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vhir
      POSTGRES_PASSWORD: vhir
      POSTGRES_DB: vhir
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vhir"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    environment:
      VHIR_DATABASE_URL: "postgresql+asyncpg://vhir:vhir@postgres:5432/vhir"
      VHIR_DEV_TOKEN_MODE: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  ezyvet-adapter:
    build: ../adapters/ezyvet
    environment:
      EZYVET_CLIENT_ID: "${EZYVET_CLIENT_ID:-}"
      EZYVET_CLIENT_SECRET: "${EZYVET_CLIENT_SECRET:-}"
      EZYVET_PARTNER_ID: "${EZYVET_PARTNER_ID:-}"
      EZYVET_BASE_URL: "${EZYVET_BASE_URL:-https://api.ezyvet.com}"
      EZYVET_VHIR_BASE_URL: "http://server:8000"
      EZYVET_VHIR_TOKEN: "${EZYVET_VHIR_TOKEN:-dev}"
      EZYVET_POLL_INTERVAL_SECONDS: "60"
    ports:
      - "8001:8001"
    depends_on:
      server:
        condition: service_started

volumes:
  pgdata:
