services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vhir
      POSTGRES_PASSWORD: vhir
      POSTGRES_DB: vhir
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vhir"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    environment:
      VHIR_DATABASE_URL: "postgresql+asyncpg://vhir:vhir@postgres:5432/vhir"
      VHIR_DEV_TOKEN_MODE: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
